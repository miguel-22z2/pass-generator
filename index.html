<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass Generator</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="shortcut icon" href="images/icons8-password-96.png" type="image/x-icon">
</head>
<body>
    
    <h1 id="titulo">Pass Generator</h1>
    <img src="images/icons8-password-96.png">
    
    <section id="formPass">

        <div id="resultLocal">
           <span id="localResult">Gere a senha!</span>
            <button id="buttonC">
                <i id="copyButton" class="fa-regular fa-copy" style="color: rgb(46, 141, 84);"></i>
            </button>
        </div>

        <p></p>

        <div id="infoPass">
            <label for="passLenght">Tamanho da senha: </label>
            <input id="passLength" type="number">
        </div>

        <div id="result">
             <p></p>
             <button id="btnFunction">Gerar senha</button>
        </div>

    </section>

    <footer id="rodape">
        <p><a href="https://cartilha.cert.br/fasciculos/#contas-e-senhas" target="_blank" rel="noopener noreferrer">Dicas para senhas seguras (Cert.br)</a></p>
    </footer>

    <script src="scripts/main.js"></script>
</body>
</html>
